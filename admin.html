<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | সেনা পোর্টাল</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Hind Siliguri', Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0f1c, #141b2b);
            min-height: 100vh;
            padding: 15px;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: #1e293b;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #7c3aed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #f59e0b;
            font-size: 1.8rem;
        }
        .public-link {
            background: #5b21b6;
            padding: 10px 20px;
            border-radius: 30px;
        }
        .public-link a {
            color: white;
            text-decoration: none;
        }
        .card {
            background: #1e293b;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #7c3aed;
        }
        .card h2 {
            color: #a78bfa;
            margin-bottom: 20px;
            border-bottom: 2px solid #a78bfa;
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #cbd5e1;
        }
        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 2px solid #7c3aed;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
        }
        .upload-area {
            border: 2px dashed #7c3aed;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            background: #0f172a;
        }
        .btn {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
            border: 2px solid #a78bfa;
        }
        .btn-success {
            background: #10b981;
        }
        .btn-danger {
            background: #ef4444;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #7c3aed;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ef4444;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        .item-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .list-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 8px;
            border: 2px solid #7c3aed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            background: #0f172a;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: 2px solid #7c3aed;
            display: flex;
            justify-content: space-between;
        }
        .token-section {
            background: #2d1a1a;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: 2px solid #ef4444;
        }
        .token-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 অ্যাডমিন প্যানেল</h1>
            <div class="public-link">
                <a href="index.html" target="_blank">পাবলিক ভিউ</a>
            </div>
        </div>

        <div class="status">
            <span>📁 data.json</span>
            <span id="statusText">GitHub সংযোগ পরীক্ষা করুন</span>
        </div>

        <div class="token-section">
            <h3 style="color: #ef4444;">🔑 GitHub Token</h3>
            <p style="color: #94a3b8;">Token না থাকলে <a href="https://github.com/settings/tokens" style="color: #f59e0b;">এখান থেকে</a> নিন (repo access দিন)</p>
            <div class="token-input">
                <input type="password" id="githubToken" placeholder="GitHub Token">
                <button class="btn btn-success" onclick="saveToken()">সেভ</button>
            </div>
            <small style="color: #94a3b8;">Token আপনার ব্রাউজারে সংরক্ষিত থাকবে</small>
        </div>

        <div class="card">
            <h2>👤 প্রোফাইল</h2>
            <div class="input-group">
                <label>নাম</label>
                <input type="text" id="profileName" value="সেনা ১০০৭৮৯৮">
            </div>
            <div class="input-group">
                <label>আইডি</label>
                <input type="text" id="profileId" value="১০০৭৮৯৮">
            </div>
            <div class="upload-area" onclick="document.getElementById('profileFile').click()">
                <input type="file" id="profileFile" accept="image/*" style="display:none;" onchange="uploadProfileImage(this)">
                <p>📸 প্রোফাইল ছবি আপলোড</p>
            </div>
            <button class="btn btn-success" onclick="saveProfile()" style="width:100%;">💾 প্রোফাইল সেভ</button>
            <div id="profilePreview" style="text-align:center; margin-top:15px;"></div>
        </div>

        <div class="card">
            <h2>🎥 ভিডিও</h2>
            <div class="input-group">
                <label>টাইটেল</label>
                <input type="text" id="videoTitle" placeholder="ভিডিওর নাম">
            </div>
            <div class="input-group">
                <label>ইউআরএল</label>
                <input type="url" id="videoUrl" placeholder="https://...">
            </div>
            <button class="btn" onclick="addVideo()" style="width:100%;">+ ভিডিও যোগ</button>
            <div class="item-list" id="videoList"></div>
        </div>

        <div class="card">
            <h2>🖼️ গ্যালারি</h2>
            <div class="upload-area" onclick="document.getElementById('galleryFile').click()">
                <input type="file" id="galleryFile" accept="image/*" multiple style="display:none;" onchange="uploadGalleryImages(this)">
                <p>📁 একাধিক ছবি আপলোড</p>
            </div>
            <div class="preview-grid" id="galleryPreview"></div>
        </div>

        <div class="card">
            <h2>💬 গালি</h2>
            <div class="input-group">
                <textarea id="newGaali" rows="2" placeholder="নতুন গালি লিখুন..."></textarea>
            </div>
            <button class="btn" onclick="addGaali()" style="width:100%;">+ গালি যোগ</button>
            <div class="item-list" id="gaaliList"></div>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px;">
            <button class="btn btn-success" onclick="saveToGitHub()">⬆️ GitHub-এ আপলোড</button>
            <button class="btn" onclick="loadFromGitHub()">⬇️ GitHub থেকে লোড</button>
            <button class="btn" onclick="exportData()">📥 ব্যাকআপ</button>
            <button class="btn btn-danger" onclick="resetData()">⚠️ রিসেট</button>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'robiul7804';
        const REPO_NAME = 'soldier-portal-1007898';
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/data.json`;

        let appData = {
            profile: { name: 'সেনা ১০০৭৮৯৮', id: '১০০৭৮৯৮', image: '' },
            videos: [],
            gallery: [],
            gaalis: ['হারামি ১০০৭৮৯৮']
        };

        function saveToken() {
            const token = document.getElementById('githubToken').value;
            if (token) {
                localStorage.setItem('github_token', token);
                alert('Token সংরক্ষিত হয়েছে');
            }
        }

        function getToken() {
            return localStorage.getItem('github_token') || '';
        }

        function renderUI() {
            document.getElementById('profileName').value = appData.profile.name;
            document.getElementById('profileId').value = appData.profile.id;

            document.getElementById('videoList').innerHTML = appData.videos.map((v, i) => `
                <div class="list-item">
                    <span>${v.title}</span>
                    <button class="btn-danger" style="padding:5px 10px;" onclick="deleteVideo(${i})">✕</button>
                </div>
            `).join('');

            document.getElementById('galleryPreview').innerHTML = appData.gallery.map((img, i) => `
                <div class="preview-item">
                    <img src="${img}">
                    <div class="delete-btn" onclick="deleteGalleryImage(${i})">✕</div>
                </div>
            `).join('');

            document.getElementById('gaaliList').innerHTML = appData.gaalis.map((g, i) => `
                <div class="list-item">
                    <span>${g}</span>
                    <button class="btn-danger" style="padding:5px 10px;" onclick="deleteGaali(${i})">✕</button>
                </div>
            `).join('');

            if (appData.profile.image) {
                document.getElementById('profilePreview').innerHTML = `<img src="${appData.profile.image}" style="width:60px; height:60px; border-radius:50%; border:3px solid #7c3aed;">`;
            }
        }

        function saveProfile() {
            appData.profile.name = document.getElementById('profileName').value;
            appData.profile.id = document.getElementById('profileId').value;
            renderUI();
            alert('প্রোফাইল সংরক্ষিত হয়েছে');
        }

        function uploadProfileImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    appData.profile.image = e.target.result;
                    renderUI();
                };
                reader.readAsDataURL(file);
            }
        }

        function addVideo() {
            const title = document.getElementById('videoTitle').value;
            const url = document.getElementById('videoUrl').value;
            if (title && url) {
                appData.videos.push({ title, url });
                renderUI();
                document.getElementById('videoTitle').value = '';
                document.getElementById('videoUrl').value = '';
            }
        }

        function deleteVideo(index) {
            appData.videos.splice(index, 1);
            renderUI();
        }

        function uploadGalleryImages(input) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    appData.gallery.push(e.target.result);
                    if (files.indexOf(file) === files.length - 1) renderUI();
                };
                reader.readAsDataURL(file);
            });
        }

        function deleteGalleryImage(index) {
            appData.gallery.splice(index, 1);
            renderUI();
        }

        function addGaali() {
            const newGaali = document.getElementById('newGaali').value;
            if (newGaali) {
                appData.gaalis.push(newGaali);
                renderUI();
                document.getElementById('newGaali').value = '';
            }
        }

        function deleteGaali(index) {
            appData.gaalis.splice(index, 1);
            renderUI();
        }

        async function loadFromGitHub() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/data.json?nocache=${Date.now()}`);
                if (res.ok) {
                    appData = await res.json();
                    renderUI();
                    alert('GitHub থেকে লোড করা হয়েছে');
                }
            } catch (e) {
                alert('লোড করতে সমস্যা');
            }
        }

        async function saveToGitHub() {
            const token = getToken();
            if (!token) {
                alert('প্রথমে GitHub Token দিন');
                return;
            }

            try {
                let sha = '';
                const shaRes = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (shaRes.ok) {
                    const shaData = await shaRes.json();
                    sha = shaData.sha;
                }

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(appData, null, 2))));
                
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update from admin - ${new Date().toLocaleString()}`,
                        content: content,
                        sha: sha
                    })
                });

                if (res.ok) {
                    alert('✅ GitHub-এ আপলোড হয়েছে!');
                } else {
                    alert('আপলোড ব্যর্থ');
                }
            } catch (e) {
                alert('আপলোড ব্যর্থ');
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup-${Date.now()}.json`;
            a.click();
        }

        function resetData() {
            if (confirm('সব ডাটা রিসেট করবেন?')) {
                localStorage.removeItem('github_token');
                location.reload();
            }
        }

        const saved = localStorage.getItem('github_token');
        if (saved) document.getElementById('githubToken').placeholder = 'Token সংরক্ষিত আছে';

        renderUI();
    </script>
</body>
</html>
