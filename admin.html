<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔐 অ্যাডমিন প্যানেল | সেনা পোর্টাল</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --primary-light: #a78bfa;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-card: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: linear-gradient(135deg, #0a0f1c, #141b2b);
            min-height: 100vh;
            padding: 15px;
            color: white;
        }

        .admin-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .admin-header {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--primary-light);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #f59e0b, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .public-link {
            background: var(--primary-dark);
            padding: 10px 20px;
            border-radius: 40px;
            border: 2px solid var(--accent);
        }

        .public-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .github-status {
            background: #0f172a;
            border-radius: 30px;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid var(--primary-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .admin-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--primary-light);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--primary-light);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 2px solid var(--primary-light);
            border-radius: 25px;
            color: white;
            font-size: 1rem;
        }

        .upload-area {
            border: 2px dashed var(--primary-light);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            background: #0f172a;
        }

        .upload-area i {
            font-size: 2rem;
            color: var(--primary-light);
            margin-bottom: 5px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid var(--primary-light);
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-success {
            background: var(--success);
            border-color: #6ee7b7;
        }

        .btn-danger {
            background: var(--danger);
            border-color: #fca5a5;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--primary-light);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--danger);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 1px solid white;
        }

        .item-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .list-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 8px;
            border: 2px solid var(--primary-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .token-section {
            background: #1a1f35;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
        }

        .token-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .token-input input {
            flex: 1;
            padding: 12px;
            background: #0f172a;
            border: 2px solid var(--primary-light);
            border-radius: 25px;
            color: white;
        }

        .success-message {
            background: var(--success);
            color: white;
            padding: 12px;
            border-radius: 25px;
            text-align: center;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🔐 অ্যাডমিন প্যানেল</h1>
            <div class="public-link">
                <a href="index.html" target="_blank">👥 পাবলিক ভিউ</a>
            </div>
        </div>

        <div class="github-status">
            <div>
                <span class="status-dot"></span>
                <span id="connectionText">GitHub সংযোগ পরীক্ষা করুন</span>
            </div>
            <div id="dataInfo">data.json</div>
        </div>

        <!-- Token Section -->
        <div class="token-section">
            <h3 style="color: var(--accent); margin-bottom: 10px;">🔑 GitHub Token</h3>
            <p style="font-size: 0.9rem; color: #94a3b8;">Token না থাকলে <a href="https://github.com/settings/tokens" target="_blank" style="color: var(--accent);">এখান থেকে</a> নিন (repo access দিন)</p>
            <div class="token-input">
                <input type="password" id="githubToken" placeholder="GitHub Personal Access Token">
                <button class="btn btn-success" onclick="saveToken()">সেভ</button>
            </div>
            <small style="color: #94a3b8;">Token আপনার ব্রাউজারে সংরক্ষিত থাকবে</small>
        </div>

        <!-- Profile Card -->
        <div class="admin-card">
            <div class="card-title">👤 প্রোফাইল</div>
            <div class="input-group">
                <label>নাম</label>
                <input type="text" id="profileName" value="সেনা ১০০৭৮৯৮">
            </div>
            <div class="input-group">
                <label>আইডি</label>
                <input type="text" id="profileId" value="১০০৭৮৯৮">
            </div>
            <div class="upload-area" onclick="document.getElementById('profileFile').click()">
                <input type="file" id="profileFile" accept="image/*" style="display: none;" onchange="handleProfileImage(this)">
                <i>📸</i>
                <p>প্রোফাইল ছবি আপলোড করুন</p>
            </div>
            <button class="btn btn-success" onclick="saveProfile()" style="width:100%;">💾 প্রোফাইল সেভ</button>
            <div id="profilePreview" style="text-align: center; margin-top: 10px;"></div>
        </div>

        <!-- Video Card -->
        <div class="admin-card">
            <div class="card-title">🎥 ভিডিও</div>
            <div class="input-group">
                <label>টাইটেল</label>
                <input type="text" id="videoTitle" placeholder="ভিডিওর নাম">
            </div>
            <div class="input-group">
                <label>ইউআরএল</label>
                <input type="url" id="videoUrl" placeholder="https://...">
            </div>
            <button class="btn" onclick="addVideo()" style="width:100%;">+ ভিডিও যোগ করুন</button>
            <div class="item-list" id="videoList"></div>
        </div>

        <!-- Gallery Card -->
        <div class="admin-card">
            <div class="card-title">🖼️ গ্যালারি</div>
            <div class="upload-area" onclick="document.getElementById('galleryFile').click()">
                <input type="file" id="galleryFile" accept="image/*" multiple style="display: none;" onchange="handleGalleryImages(this)">
                <i>📁</i>
                <p>একাধিক ছবি আপলোড করুন</p>
            </div>
            <div class="preview-grid" id="galleryPreview"></div>
        </div>

        <!-- Gaali Card -->
        <div class="admin-card">
            <div class="card-title">💬 গালি</div>
            <div class="input-group">
                <textarea id="newGaali" rows="2" placeholder="নতুন গালি লিখুন..."></textarea>
            </div>
            <button class="btn" onclick="addGaali()" style="width:100%;">+ গালি যোগ করুন</button>
            <div class="item-list" id="gaaliList"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-group">
            <button class="btn btn-success" onclick="saveAllToGitHub()">⬆️ GitHub-এ আপলোড</button>
            <button class="btn" onclick="loadFromGitHub()">⬇️ GitHub থেকে লোড</button>
            <button class="btn" onclick="exportData()">📥 ব্যাকআপ</button>
            <button class="btn" onclick="importData()">📤 রিস্টোর</button>
            <button class="btn btn-danger" onclick="resetData()">⚠️ রিসেট</button>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">✅ সফলভাবে আপলোড হয়েছে!</div>
    </div>

    <script>
        // ================ কনফিগারেশন ================
        const GITHUB_USERNAME = 'robiul7804';
        const REPO_NAME = 'soldier-portal-1007898';
        const DATA_FILE = 'data.json';
        const BRANCH = 'main';
        
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${DATA_FILE}`;

        // ================ ডাটা স্ট্রাকচার ================
        let appData = {
            profile: {
                name: 'সেনা ১০০৭৮৯৮',
                id: '১০০৭৮৯৮',
                image: ''
            },
            videos: [
                { title: '🔞 ভিডিও ১', url: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4' },
                { title: '💦 ভিডিও ২', url: 'https://test-videos.co.uk/vids/sintel/mp4/av1/1080/Sintel_1080_10s_2MB.mp4' }
            ],
            gallery: [],
            gaalis: [
                'হারামি ১০০৭৮৯৮! তোর বাপের নাম কী?',
                'বেইমান ১০০৭৮৯৮, তোকে একঘরে করে দেব!',
                '১০০৭৮৯৮ শালা কুত্তার বাচ্চা!'
            ]
        };

        // ================ টোকেন ম্যানেজমেন্ট ================
        function saveToken() {
            const token = document.getElementById('githubToken').value;
            if (token) {
                localStorage.setItem('github_token', token);
                alert('✅ Token সংরক্ষিত হয়েছে');
                document.getElementById('githubToken').value = '********';
            }
        }

        function getToken() {
            return localStorage.getItem('github_token') || '';
        }

        // ================ ইউআই রেন্ডার ================
        function renderUI() {
            document.getElementById('profileName').value = appData.profile.name;
            document.getElementById('profileId').value = appData.profile.id;

            // ভিডিও লিস্ট
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = appData.videos.map((v, i) => `
                <div class="list-item">
                    <span>${v.title}</span>
                    <button class="btn-danger" style="padding:5px 10px;" onclick="deleteVideo(${i})">✕</button>
                </div>
            `).join('');

            // গ্যালারি প্রিভিউ
            const galleryPreview = document.getElementById('galleryPreview');
            galleryPreview.innerHTML = appData.gallery.map((img, i) => `
                <div class="preview-item">
                    <img src="${img}">
                    <div class="delete-btn" onclick="deleteGalleryImage(${i})">✕</div>
                </div>
            `).join('');

            // গালি লিস্ট
            const gaaliList = document.getElementById('gaaliList');
            gaaliList.innerHTML = appData.gaalis.map((g, i) => `
                <div class="list-item">
                    <span>${g}</span>
                    <button class="btn-danger" style="padding:5px 10px;" onclick="deleteGaali(${i})">✕</button>
                </div>
            `).join('');

            // প্রোফাইল প্রিভিউ
            if (appData.profile.image) {
                document.getElementById('profilePreview').innerHTML = `<img src="${appData.profile.image}" style="width:60px; height:60px; border-radius:50%; border:3px solid var(--primary-light);">`;
            }
        }

        // ================ প্রোফাইল ফাংশন ================
        function saveProfile() {
            appData.profile.name = document.getElementById('profileName').value;
            appData.profile.id = document.getElementById('profileId').value;
            renderUI();
            showMessage('✅ প্রোফাইল সংরক্ষিত হয়েছে');
        }

        function handleProfileImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    appData.profile.image = e.target.result;
                    renderUI();
                };
                reader.readAsDataURL(file);
            }
        }

        // ================ ভিডিও ফাংশন ================
        function addVideo() {
            const title = document.getElementById('videoTitle').value;
            const url = document.getElementById('videoUrl').value;
            if (title && url) {
                appData.videos.push({ title, url });
                renderUI();
                document.getElementById('videoTitle').value = '';
                document.getElementById('videoUrl').value = '';
                showMessage('✅ ভিডিও যোগ করা হয়েছে');
            }
        }

        function deleteVideo(index) {
            if (confirm('ভিডিওটি ডিলিট করবেন?')) {
                appData.videos.splice(index, 1);
                renderUI();
            }
        }

        // ================ গ্যালারি ফাংশন ================
        function handleGalleryImages(input) {
            const files = Array.from(input.files);
            let loaded = 0;
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    appData.gallery.push(e.target.result);
                    loaded++;
                    if (loaded === files.length) {
                        renderUI();
                        showMessage(`✅ ${files.length} টি ছবি যোগ করা হয়েছে`);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function deleteGalleryImage(index) {
            if (confirm('ছবিটি ডিলিট করবেন?')) {
                appData.gallery.splice(index, 1);
                renderUI();
            }
        }

        // ================ গালি ফাংশন ================
        function addGaali() {
            const newGaali = document.getElementById('newGaali').value;
            if (newGaali) {
                appData.gaalis.push(newGaali);
                renderUI();
                document.getElementById('newGaali').value = '';
                showMessage('✅ গালি যোগ করা হয়েছে');
            }
        }

        function deleteGaali(index) {
            if (confirm('গালিটি ডিলিট করবেন?')) {
                appData.gaalis.splice(index, 1);
                renderUI();
            }
        }

        // ================ GitHub ফাংশন ================
        async function loadFromGitHub() {
            try {
                document.getElementById('connectionText').innerHTML = '⏳ লোড হচ্ছে...';
                
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${DATA_FILE}?nocache=${Date.now()}`);
                if (!response.ok) throw new Error('ডাটা পাওয়া যায়নি');
                
                const data = await response.json();
                appData = data;
                renderUI();
                
                document.getElementById('connectionText').innerHTML = '✅ লোড সম্পন্ন';
                showMessage('✅ GitHub থেকে লোড করা হয়েছে');
            } catch (error) {
                document.getElementById('connectionText').innerHTML = '❌ লোড ব্যর্থ';
                alert('GitHub থেকে লোড করা যায়নি');
            }
        }

        async function saveAllToGitHub() {
            const token = getToken();
            if (!token) {
                alert('❌ আগে GitHub Token দিন');
                return;
            }

            try {
                document.getElementById('connectionText').innerHTML = '⏳ আপলোড হচ্ছে...';
                
                // SHA পাওয়ার চেষ্টা করুন
                let sha = '';
                const shaResponse = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (shaResponse.ok) {
                    const shaData = await shaResponse.json();
                    sha = shaData.sha;
                }

                // ডাটা আপলোড
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(appData, null, 2))));
                
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `অ্যাডমিন প্যানেল থেকে আপডেট - ${new Date().toLocaleString('bn-BD')}`,
                        content: content,
                        sha: sha,
                        branch: BRANCH
                    })
                });

                if (response.ok) {
                    document.getElementById('connectionText').innerHTML = '✅ আপলোড সম্পন্ন';
                    showMessage('✅ GitHub-এ আপলোড করা হয়েছে! ইউজার প্যানেল ১০ সেকেন্ডের মধ্যে আপডেট হবে');
                    
                    // সফল হলে localStorage-এও সেভ করুন (অন্য ট্যাবের জন্য)
                    localStorage.setItem('soldierAdminData', JSON.stringify(appData));
                    
                } else {
                    throw new Error('আপলোড ব্যর্থ');
                }
            } catch (error) {
                console.error('Save error:', error);
                document.getElementById('connectionText').innerHTML = '❌ আপলোড ব্যর্থ';
                alert('GitHub-এ আপলোড করা যায়নি। Token এবং ইন্টারনেট চেক করুন।');
            }
        }

        // ================ ব্যাকআপ ফাংশন ================
        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-${Date.now()}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        appData = JSON.parse(e.target.result);
                        renderUI();
                        showMessage('✅ ব্যাকআপ রিস্টোর করা হয়েছে');
                    } catch (error) {
                        alert('❌ ভুল JSON ফাইল');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetData() {
            if (confirm('সব ডাটা রিসেট করবেন? এটি অপরিবর্তনীয়!')) {
                localStorage.removeItem('soldierAdminData');
                location.reload();
            }
        }

        // ================ হেল্পার ফাংশন ================
        function showMessage(msg) {
            const msgBox = document.getElementById('successMessage');
            msgBox.style.display = 'block';
            msgBox.textContent = msg;
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }

        // ================ প্রথম লোড ================
        renderUI();
        
        // লোকাল স্টোরেজ থেকে ডাটা লোড
        const saved = localStorage.getItem('soldierAdminData');
        if (saved) {
            appData = JSON.parse(saved);
            renderUI();
        }

        // Token দেখান
        const savedToken = localStorage.getItem('github_token');
        if (savedToken) {
            document.getElementById('githubToken').placeholder = 'Token সংরক্ষিত আছে';
        }
    </script>
</body>
</html>
