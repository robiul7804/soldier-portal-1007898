<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>সেনা পোর্টাল ১০০৭৮৯৮ | অফিসিয়াল</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        /* আপনার আগের স্টাইল এখানে থাকবে */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hind Siliguri', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --primary-light: #a78bfa;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-card: #1e293b;
            --light-text: #f8fafc;
            --gray-text: #cbd5e1;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a1f35 100%);
            min-height: 100vh;
            padding: 12px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .profile-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--primary-light);
            border-radius: 40px;
            padding: 25px 20px;
            margin-bottom: 20px;
            box-shadow: 0 20px 30px -15px black;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar-large {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary-light);
            box-shadow: 0 15px 25px -10px black;
            overflow: hidden;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
        }

        @media (min-width: 768px) {
            .avatar-large {
                width: 150px;
                height: 150px;
            }
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-large .no-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .profile-info {
            text-align: center;
            width: 100%;
        }

        .profile-info h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #f59e0b, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            word-break: break-word;
        }

        @media (min-width: 768px) {
            .profile-info h1 {
                font-size: 2.8rem;
            }
        }

        .id-badge {
            background: linear-gradient(135deg, #312e81, #581c87);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            display: inline-block;
            border: 2px solid var(--accent);
            box-shadow: 0 8px 15px -5px black;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 1.8rem;
            color: var(--primary-light);
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (min-width: 640px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .video-card {
            background: var(--dark-card);
            border-radius: 30px;
            padding: 15px;
            border: 2px solid var(--primary-light);
            transition: 0.3s;
        }

        .video-card:active {
            transform: scale(0.98);
        }

        .video-player {
            aspect-ratio: 16/9;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid var(--accent);
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            text-align: center;
            padding: 0 5px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary-light);
            box-shadow: 0 10px 15px -8px black;
            transition: 0.3s;
        }

        .gallery-item:active {
            transform: scale(0.97);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gaali-section {
            background: linear-gradient(145deg, #2a1f3a, #1f1a2f);
            border-radius: 50px;
            padding: 25px 20px;
            margin-top: 30px;
            border: 2px solid var(--primary-light);
        }

        .gaali-btn {
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            border: 4px solid #fca5a5;
            color: white;
            padding: 20px 15px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 80px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 12px 0 #7f1d1d, 0 15px 25px black;
            transition: 0.1s;
            margin-bottom: 20px;
            letter-spacing: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 768px) {
            .gaali-btn {
                font-size: 3.5rem;
                padding: 25px;
            }
        }

        .gaali-btn:active {
            transform: translateY(8px);
            box-shadow: 0 5px 0 #7f1d1d, 0 15px 25px black;
        }

        .gaali-output {
            background: #1c1326;
            border-radius: 60px;
            padding: 20px 15px;
            color: #fecaca;
            font-size: 1.3rem;
            font-weight: 600;
            border: 3px solid #ef4444;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        .status-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border: 1px solid var(--primary-light);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
        }

        .dot.connected {
            background: #10b981;
            animation: pulse 1.5s infinite;
        }

        .refresh-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--primary-light);
        }

        .footer {
            text-align: center;
            margin: 60px 0 80px;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" style="text-align: center; padding: 50px;">⏳ ডাটা লোড হচ্ছে...</div>
    </div>

    <div class="status-bar" id="statusBar">
        <div class="status-indicator">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">সংযোগ হচ্ছে...</span>
        </div>
        <button class="refresh-btn" onclick="forceRefresh()">🔄 রিফ্রেশ</button>
    </div>

    <script>
        // ================ কনফিগারেশন ================
        const GITHUB_USERNAME = 'robiul7804';
        const REPO_NAME = 'soldier-portal-1007898';
        const DATA_FILE = 'data.json';
        const BRANCH = 'main';
        
        // একাধিক URL চেষ্টা করবে
        const DATA_URLS = [
            `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${DATA_FILE}?nocache=${Date.now()}`,
            `https://cdn.jsdelivr.net/gh/${GITHUB_USERNAME}/${REPO_NAME}/${DATA_FILE}?nocache=${Date.now()}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${DATA_FILE}`)}`
        ];

        let appData = {
            profile: { name: 'সেনা ১০০৭৮৯৮', id: '১০০৭৮৯৮', image: '' },
            videos: [],
            gallery: [],
            gaalis: ['হারামি ১০০৭৮৯৮!']
        };

        // ================ স্ট্যাটাস আপডেট ================
        function updateStatus(connected, message) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.className = 'dot connected';
                text.textContent = message || 'সংযুক্ত';
            } else {
                dot.className = 'dot';
                text.textContent = message || 'সংযোগ নেই';
            }
        }

        // ================ ফোর্স রিফ্রেশ ================
        function forceRefresh() {
            updateStatus(false, 'রিফ্রেশ হচ্ছে...');
            loadData();
        }

        // ================ একাধিক URL থেকে ডাটা লোড ================
        async function loadData() {
            let lastError = null;
            
            for (const url of DATA_URLS) {
                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        },
                        cache: 'no-store'
                    });
                    
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    if (data && data.profile) {
                        appData = data;
                        renderUI();
                        updateStatus(true, 'আপডেট: ' + new Date().toLocaleTimeString());
                        
                        // সফল হলে localStorage-এ ব্যাকআপ
                        try {
                            localStorage.setItem('soldierPortalBackup', JSON.stringify(appData));
                        } catch (e) {}
                        
                        return;
                    }
                } catch (error) {
                    lastError = error;
                    continue;
                }
            }
            
            // সব URL ব্যর্থ হলে ব্যাকআপ দেখান
            try {
                const backup = localStorage.getItem('soldierPortalBackup');
                if (backup) {
                    appData = JSON.parse(backup);
                    renderUI();
                    updateStatus(false, 'ব্যাকআপ দেখাচ্ছে');
                } else {
                    renderUI(); // ডিফল্ট ডাটা
                    updateStatus(false, 'কোন ডাটা নেই');
                }
            } catch (e) {
                renderUI();
                updateStatus(false, 'কানেক্ট হয়নি');
            }
        }

        // ================ ইউআই রেন্ডার ================
        function renderUI() {
            const app = document.getElementById('app');
            
            // প্রোফাইল ইমেজ
            let profileImageHTML = appData.profile.image 
                ? `<img src="${appData.profile.image}">`
                : `<div class="no-image">${appData.profile.name.charAt(0)}</div>`;

            // ভিডিও
            let videosHTML = appData.videos?.length > 0 ? `
                <div class="section-title">🎥 ভিডিও (${appData.videos.length})</div>
                <div class="video-grid">
                    ${appData.videos.map(v => `
                        <div class="video-card">
                            <div class="video-player">
                                <video controls playsinline>
                                    <source src="${v.url}" type="video/mp4">
                                </video>
                            </div>
                            <div class="video-title">${v.title}</div>
                        </div>
                    `).join('')}
                </div>
            ` : '<div class="no-data">📹 কোনো ভিডিও নেই</div>';

            // গ্যালারি
            let galleryHTML = appData.gallery?.length > 0 ? `
                <div class="section-title">🖼️ গ্যালারি (${appData.gallery.length})</div>
                <div class="gallery-grid">
                    ${appData.gallery.map(img => `
                        <div class="gallery-item">
                            <img src="${img}" loading="lazy">
                        </div>
                    `).join('')}
                </div>
            ` : '<div class="no-data">🖼️ কোনো ছবি নেই</div>';

            // গালি
            let gaaliHTML = appData.gaalis?.length > 0 ? `
                <div class="gaali-section">
                    <div class="gaali-btn" id="gaaliBtn">${appData.profile.id}</div>
                    <div class="gaali-output" id="gaaliOutput">🔊 বাটনে ক্লিক করুন</div>
                </div>
            ` : '';

            app.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar-large">${profileImageHTML}</div>
                        <div class="profile-info">
                            <h1>${appData.profile.name}</h1>
                            <div class="id-badge">${appData.profile.id}</div>
                        </div>
                    </div>
                </div>
                ${videosHTML}
                ${galleryHTML}
                ${gaaliHTML}
                <div class="footer">© ${new Date().getFullYear()} সেনা পোর্টাল</div>
            `;

            // গালি ইভেন্ট
            document.getElementById('gaaliBtn')?.addEventListener('click', function() {
                if (appData.gaalis?.length > 0) {
                    const random = appData.gaalis[Math.floor(Math.random() * appData.gaalis.length)];
                    document.getElementById('gaaliOutput').textContent = random;
                    
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(random);
                        utterance.lang = 'bn-BD';
                        window.speechSynthesis.speak(utterance);
                    }
                }
            });
        }

        // ================ রিয়েল-টাইম আপডেট ================
        // প্রতি ১০ সেকেন্ডে ডাটা চেক করুন
        setInterval(loadData, 10000);

        // অ্যাপ ফোরগ্রাউন্ডে আসলে রিফ্রেশ
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                loadData();
            }
        });

        // প্রথম লোড
        loadData();
    </script>
</body>
</html>
