<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>সেনা পোর্টাল ১০০৭৮৯৮ | অফিসিয়াল</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hind Siliguri', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --primary-light: #a78bfa;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-card: #1e293b;
            --light-text: #f8fafc;
            --gray-text: #cbd5e1;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a1f35 100%);
            min-height: 100vh;
            padding: 12px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px; /* মোবাইলের জন্য পারফেক্ট */
            width: 100%;
            margin: 0 auto;
        }

        /* প্রোফাইল কার্ড - মোবাইল অপ্টিমাইজড */
        .profile-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--primary-light);
            border-radius: 40px;
            padding: 25px 20px;
            margin-bottom: 20px;
            box-shadow: 0 20px 30px -15px black;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* অ্যাভাটার - মোবাইলে সাইজ ঠিক করা */
        .avatar-large {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary-light);
            box-shadow: 0 15px 25px -10px black;
            overflow: hidden;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
        }

        @media (min-width: 768px) {
            .avatar-large {
                width: 150px;
                height: 150px;
            }
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-large .no-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .profile-info {
            text-align: center;
            width: 100%;
        }

        .profile-info h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #f59e0b, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            word-break: break-word;
        }

        @media (min-width: 768px) {
            .profile-info h1 {
                font-size: 2.8rem;
            }
        }

        .id-badge {
            background: linear-gradient(135deg, #312e81, #581c87);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            display: inline-block;
            border: 2px solid var(--accent);
            box-shadow: 0 8px 15px -5px black;
            letter-spacing: 1px;
        }

        /* সেকশন টাইটেল */
        .section-title {
            font-size: 1.8rem;
            color: var(--primary-light);
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 10px;
        }

        /* ভিডিও গ্রিড - মোবাইলে ১ কলাম */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (min-width: 640px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .video-card {
            background: var(--dark-card);
            border-radius: 30px;
            padding: 15px;
            border: 2px solid var(--primary-light);
            transition: 0.3s;
        }

        .video-card:active {
            transform: scale(0.98);
        }

        .video-player {
            aspect-ratio: 16/9;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid var(--accent);
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            text-align: center;
            padding: 0 5px;
        }

        /* গ্যালারি গ্রিড - মোবাইলে ২ কলাম */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary-light);
            box-shadow: 0 10px 15px -8px black;
            transition: 0.3s;
        }

        .gallery-item:active {
            transform: scale(0.97);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* গালি সেকশন - মোবাইল ফ্রেন্ডলি */
        .gaali-section {
            background: linear-gradient(145deg, #2a1f3a, #1f1a2f);
            border-radius: 50px;
            padding: 25px 20px;
            margin-top: 30px;
            border: 2px solid var(--primary-light);
        }

        .gaali-btn {
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            border: 4px solid #fca5a5;
            color: white;
            padding: 20px 15px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 80px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 12px 0 #7f1d1d, 0 15px 25px black;
            transition: 0.1s;
            margin-bottom: 20px;
            letter-spacing: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 768px) {
            .gaali-btn {
                font-size: 3.5rem;
                padding: 25px;
            }
        }

        .gaali-btn:active {
            transform: translateY(8px);
            box-shadow: 0 5px 0 #7f1d1d, 0 15px 25px black;
        }

        .gaali-output {
            background: #1c1326;
            border-radius: 60px;
            padding: 20px 15px;
            color: #fecaca;
            font-size: 1.3rem;
            font-weight: 600;
            border: 3px solid #ef4444;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        /* লাইভ স্ট্যাটাস - ছোট করে */
        .live-badge {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
            border: 1px solid white;
        }

        .live-badge .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ফুটার */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.8rem;
            border-top: 1px solid var(--primary-light);
        }

        /* লোডিং */
        .loading {
            text-align: center;
            padding: 50px 20px;
            font-size: 1.3rem;
            color: var(--primary-light);
        }

        /* নো ডাটা মেসেজ */
        .no-data {
            text-align: center;
            padding: 30px;
            color: var(--gray-text);
            background: var(--dark-card);
            border-radius: 30px;
            border: 2px dashed var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⏳ ডাটা লোড হচ্ছে...</div>
    </div>

    <!-- লাইভ স্ট্যাটাস (ছোট) -->
    <div class="live-badge">
        <span class="dot"></span>
        <span id="liveStatus">লাইভ</span>
    </div>

    <script>
        // ================ ডাটা স্ট্রাকচার ================
        let appData = {
            profile: {
                name: 'সেনা ১০০৭৮৯৮',
                id: '১০০৭৮৯৮',
                image: ''
            },
            videos: [
                { title: '🔞 ভিডিও ১', url: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4' },
                { title: '💦 ভিডিও ২', url: 'https://test-videos.co.uk/vids/sintel/mp4/av1/1080/Sintel_1080_10s_2MB.mp4' }
            ],
            gallery: [],
            gaalis: [
                'হারামি ১০০৭৮৯৮! তোর বাপের নাম কী?',
                'বেইমান ১০০৭৮৯৮, তোকে একঘরে করে দেব!',
                '১০০৭৮৯৮ শালা কুত্তার বাচ্চা!'
            ]
        };

        // ================ লোকাল স্টোরেজ থেকে ডাটা লোড ================
        function loadData() {
            try {
                const adminData = localStorage.getItem('soldierAdminData');
                if (adminData) {
                    const newData = JSON.parse(adminData);
                    if (JSON.stringify(appData) !== JSON.stringify(newData)) {
                        appData = newData;
                        renderUI();
                        document.getElementById('liveStatus').innerHTML = 'আপডেট ' + new Date().toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    }
                } else {
                    // প্রথম বার থাকলে রেন্ডার করুন
                    renderUI();
                }
            } catch (e) {
                console.log('ডাটা লোড করতে সমস্যা:', e);
                renderUI();
            }
        }

        // ================ ইউআই রেন্ডার ================
        function renderUI() {
            const app = document.getElementById('app');
            
            // প্রোফাইল ইমেজ
            let profileImageHTML = '';
            if (appData.profile.image) {
                profileImageHTML = `<img src="${appData.profile.image}" alt="Profile">`;
            } else {
                profileImageHTML = `<div class="no-image">${appData.profile.name.charAt(0)}</div>`;
            }

            // ভিডিও সেকশন
            let videosHTML = '';
            if (appData.videos && appData.videos.length > 0) {
                videosHTML = `
                    <div class="section-title">
                        <span>🎥</span> ভিডিও (${appData.videos.length})
                    </div>
                    <div class="video-grid">
                        ${appData.videos.map(v => `
                            <div class="video-card">
                                <div class="video-player">
                                    <video controls playsinline preload="metadata">
                                        <source src="${v.url}" type="video/mp4">
                                    </video>
                                </div>
                                <div class="video-title">${v.title}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // গ্যালারি সেকশন
            let galleryHTML = '';
            if (appData.gallery && appData.gallery.length > 0) {
                galleryHTML = `
                    <div class="section-title">
                        <span>🖼️</span> গ্যালারি (${appData.gallery.length})
                    </div>
                    <div class="gallery-grid">
                        ${appData.gallery.map(img => `
                            <div class="gallery-item">
                                <img src="${img}" alt="Gallery" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // গালি সেকশন
            let gaaliHTML = '';
            if (appData.gaalis && appData.gaalis.length > 0) {
                gaaliHTML = `
                    <div class="gaali-section">
                        <div class="gaali-btn" id="gaaliBtn">${appData.profile.id}</div>
                        <div class="gaali-output" id="gaaliOutput">🔊 বাটনে ক্লিক করুন</div>
                    </div>
                `;
            }

            // সম্পূর্ণ HTML
            app.innerHTML = `
                <!-- প্রোফাইল কার্ড -->
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar-large">
                            ${profileImageHTML}
                        </div>
                        <div class="profile-info">
                            <h1>${appData.profile.name}</h1>
                            <div class="id-badge">${appData.profile.id}</div>
                        </div>
                    </div>
                </div>

                ${videosHTML || '<div class="no-data">📹 কোনো ভিডিও নেই</div>'}
                ${galleryHTML || '<div class="no-data">🖼️ কোনো ছবি নেই</div>'}
                ${gaaliHTML}

                <!-- ফুটার -->
                <div class="footer">
                    © ${new Date().getFullYear()} সেনা পোর্টাল
                </div>
            `;

            // গালি বাটন ইভেন্ট
            const gaaliBtn = document.getElementById('gaaliBtn');
            if (gaaliBtn) {
                gaaliBtn.addEventListener('click', function() {
                    if (appData.gaalis && appData.gaalis.length > 0) {
                        const randomGaali = appData.gaalis[Math.floor(Math.random() * appData.gaalis.length)];
                        document.getElementById('gaaliOutput').textContent = randomGaali;
                        
                        if (window.speechSynthesis) {
                            window.speechSynthesis.cancel();
                            const utterance = new SpeechSynthesisUtterance(randomGaali);
                            utterance.lang = 'bn-BD';
                            utterance.rate = 0.9;
                            window.speechSynthesis.speak(utterance);
                        }
                    }
                });
            }
        }

        // ================ রিয়েল-টাইম আপডেট (প্রতি ২ সেকেন্ড) ================
        setInterval(loadData, 2000);

        // ================ প্রথম লোড ================
        loadData();

        // মোবাইল টাচ হাইলাইট অফ করুন
        document.addEventListener('touchstart', function(){}, true);
    </script>
</body>
</html>
