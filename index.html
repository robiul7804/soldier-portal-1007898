<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সেনা পোর্টাল ১০০৭৮৯৮ | পাবলিক ভিউ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --primary-light: #a78bfa;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-card: #1e293b;
            --light-text: #f8fafc;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a1f35 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
            position: relative;
        }

        /* অ্যাডমিন নোটিফিকেশন */
        .admin-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid #f59e0b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .admin-badge:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .admin-badge a {
            color: white;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 60px auto 0;
        }

        /* প্রোফাইল কার্ড */
        .profile-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 3px solid var(--primary-light);
            border-radius: 60px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 30px 50px -20px black;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .avatar-large {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid var(--primary-light);
            box-shadow: 0 20px 30px -10px black;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-large .no-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }

        .profile-info {
            text-align: center;
        }

        .profile-info h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #f59e0b, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .id-badge {
            background: linear-gradient(135deg, #312e81, #581c87);
            padding: 15px 40px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: 700;
            display: inline-block;
            border: 3px solid var(--accent);
            box-shadow: 0 10px 20px -5px black;
            letter-spacing: 2px;
        }

        /* সেকশন টাইটেল */
        .section-title {
            font-size: 2.5rem;
            color: var(--primary-light);
            margin: 50px 0 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 3px solid var(--primary-light);
            padding-bottom: 15px;
        }

        /* ভিডিও গ্রিড */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .video-card {
            background: var(--dark-card);
            border-radius: 40px;
            padding: 20px;
            border: 3px solid var(--primary-light);
            transition: 0.3s;
        }

        .video-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 30px -10px var(--primary);
        }

        .video-player {
            aspect-ratio: 16/9;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 3px solid var(--accent);
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            text-align: center;
        }

        /* গ্যালারি গ্রিড */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 30px;
            overflow: hidden;
            border: 4px solid var(--primary-light);
            box-shadow: 0 15px 25px -10px black;
            transition: 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 20px 30px -5px var(--primary);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* গালি সেকশন */
        .gaali-section {
            background: linear-gradient(145deg, #2a1f3a, #1f1a2f);
            border-radius: 80px;
            padding: 50px;
            margin-top: 50px;
            border: 3px solid var(--primary-light);
        }

        .gaali-btn {
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            border: 6px solid #fca5a5;
            color: white;
            padding: 30px;
            font-size: 4rem;
            font-weight: 900;
            border-radius: 120px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 20px 0 #7f1d1d, 0 30px 40px black;
            transition: 0.1s;
            margin-bottom: 30px;
            letter-spacing: 8px;
        }

        .gaali-btn:active {
            transform: translateY(15px);
            box-shadow: 0 8px 0 #7f1d1d, 0 30px 40px black;
        }

        .gaali-output {
            background: #1c1326;
            border-radius: 80px;
            padding: 30px;
            color: #fecaca;
            font-size: 2.2rem;
            font-weight: 700;
            border: 4px solid #ef4444;
            text-align: center;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        /* লোডিং অ্যানিমেশন */
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 2rem;
            color: var(--primary-light);
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* ফুটার */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: var(--gray-text);
            border-top: 2px solid var(--primary-light);
        }
    </style>
</head>
<body>
    <!-- অ্যাডমিন প্যানেল লিংক -->
    <div class="admin-badge">
        <span>🔐</span>
        <a href="admin.html">অ্যাডমিন প্যানেল</a>
    </div>

    <div class="container" id="app">
        <div class="loading">ডাটা লোড হচ্ছে</div>
    </div>

    <script>
        // ================ গ্লোবাল কনফিগ ================
        const GITHUB_USERNAME = "YOUR_GITHUB_USERNAME"; // আপনার গিটহাব ইউজারনেম দিন
        const REPO_NAME = "soldier-portal-1007898";
        const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/data.json`;

        // ================ ডাটা স্ট্রাকচার ================
        let appData = {
            profile: {
                name: 'সেনা ১০০৭৮৯৮',
                id: '১০০৭৮৯৮',
                image: ''
            },
            videos: [
                { title: '🔞 XXX - গরম ভিডিও ১', url: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4' },
                { title: '💦 এক্সএক্সএক্স - ব্লকবাস্টার ২', url: 'https://test-videos.co.uk/vids/sintel/mp4/av1/1080/Sintel_1080_10s_2MB.mp4' }
            ],
            gallery: [],
            gaalis: [
                'হারামি ১০০৭৮৯৮! তোর বাপের নাম কী?',
                'বেইমান ১০০৭৮৯৮, তোকে একঘরে করে দেব!',
                '১০০৭৮৯৮ শালা কুত্তার বাচ্চা!'
            ]
        };

        // ================ গিটহাব থেকে ডাটা লোড ================
        async function loadData() {
            try {
                const response = await fetch(DATA_URL + '?nocache=' + Date.now());
                if (response.ok) {
                    appData = await response.json();
                }
            } catch (error) {
                console.log('গিটহাব থেকে লোড করা যায়নি, লোকাল ডাটা ব্যবহার করা হবে');
            }
            renderUI();
        }

        // ================ ইউআই রেন্ডার ================
        function renderUI() {
            const app = document.getElementById('app');
            
            // প্রোফাইল সেকশন
            const profileImage = appData.profile.image 
                ? `<img src="${appData.profile.image}" alt="Profile">`
                : `<div class="no-image">${appData.profile.name.charAt(0)}</div>`;

            // ভিডিও সেকশন
            const videosHTML = appData.videos.map(v => `
                <div class="video-card">
                    <div class="video-player">
                        <video controls playsinline>
                            <source src="${v.url}" type="video/mp4">
                        </video>
                    </div>
                    <div class="video-title">${v.title}</div>
                </div>
            `).join('');

            // গ্যালারি সেকশন
            const galleryHTML = appData.gallery.map(img => `
                <div class="gallery-item">
                    <img src="${img}" alt="Gallery">
                </div>
            `).join('');

            // সম্পূর্ণ HTML
            app.innerHTML = `
                <!-- প্রোফাইল কার্ড -->
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar-large">
                            ${profileImage}
                        </div>
                        <div class="profile-info">
                            <h1>${appData.profile.name}</h1>
                            <div class="id-badge">${appData.profile.id}</div>
                        </div>
                    </div>
                </div>

                <!-- ভিডিও সেকশন -->
                ${appData.videos.length > 0 ? `
                    <div class="section-title">
                        <span>🎥</span> এক্সক্লুসিভ ভিডিও
                    </div>
                    <div class="video-grid">
                        ${videosHTML}
                    </div>
                ` : ''}

                <!-- গ্যালারি সেকশন -->
                ${appData.gallery.length > 0 ? `
                    <div class="section-title">
                        <span>🖼️</span> ফটো গ্যালারি
                    </div>
                    <div class="gallery-grid">
                        ${galleryHTML}
                    </div>
                ` : ''}

                <!-- গালি সেকশন -->
                <div class="gaali-section">
                    <div class="gaali-btn" id="gaaliBtn">${appData.profile.id}</div>
                    <div class="gaali-output" id="gaaliOutput">বাটনে ক্লিক করুন</div>
                </div>

                <!-- ফুটার -->
                <div class="footer">
                    © ${new Date().getFullYear()} - সেনা পোর্টাল | সর্বস্বত্ব সংরক্ষিত
                </div>
            `;

            // গালি বাটন ইভেন্ট
            document.getElementById('gaaliBtn').addEventListener('click', function() {
                const randomGaali = appData.gaalis[Math.floor(Math.random() * appData.gaalis.length)];
                document.getElementById('gaaliOutput').textContent = randomGaali;
                
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(randomGaali);
                    utterance.lang = 'bn-BD';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        // ================ রিয়েল-টাইম আপডেট (প্রতি ৩০ সেকেন্ড) ================
        setInterval(loadData, 30000);

        // ================ ইনিশিয়ালাইজ ================
        loadData();
    </script>
</body>
</html>
