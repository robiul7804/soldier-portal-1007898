<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>সেনা পোর্টাল | পাবলিক ভিউ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Hind Siliguri', Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0b1120, #1a1f35);
            min-height: 100vh;
            padding: 15px;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .profile-card {
            background: #1e293b;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            border: 2px solid #7c3aed;
        }
        .profile-header {
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid #a78bfa;
            overflow: hidden;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar .no-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        h1 {
            font-size: 2rem;
            color: #f59e0b;
            margin-bottom: 10px;
        }
        .id-badge {
            background: #5b21b6;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.5rem;
            border: 2px solid #f59e0b;
        }
        .section-title {
            color: #a78bfa;
            font-size: 1.8rem;
            margin: 30px 0 20px;
            border-bottom: 2px solid #a78bfa;
            padding-bottom: 10px;
        }
        .video-grid {
            display: grid;
            gap: 15px;
        }
        .video-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #7c3aed;
        }
        .video-player {
            aspect-ratio: 16/9;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .video-player video {
            width: 100%;
            height: 100%;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .gallery-item {
            aspect-ratio: 1;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #7c3aed;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gaali-section {
            background: #2a1f3a;
            border-radius: 40px;
            padding: 25px;
            margin-top: 30px;
            border: 2px solid #a78bfa;
        }
        .gaali-btn {
            background: #dc2626;
            border: 4px solid #fca5a5;
            color: white;
            padding: 20px;
            font-size: 2.5rem;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .gaali-output {
            background: #1c1326;
            border: 3px solid #ef4444;
            border-radius: 40px;
            padding: 20px;
            font-size: 1.3rem;
            text-align: center;
            min-height: 100px;
        }
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #7c3aed;
        }
        .refresh-btn {
            background: #7c3aed;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            margin: 60px 0;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div style="text-align: center; padding: 50px;">লোড হচ্ছে...</div>
    </div>
    
    <div class="status-bar">
        <span id="statusText">সংযোগ হচ্ছে...</span>
        <button class="refresh-btn" onclick="loadData()">রিফ্রেশ</button>
    </div>

    <script>
        const GITHUB_USERNAME = 'robiul7804';
        const REPO_NAME = 'soldier-portal-1007898';
        const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/data.json?nocache=${Date.now()}`;

        let appData = {
            profile: { name: 'সেনা ১০০৭৮৯৮', id: '১০০৭৮৯৮', image: '' },
            videos: [],
            gallery: [],
            gaalis: ['হারামি ১০০৭৮৯৮']
        };

        async function loadData() {
            try {
                document.getElementById('statusText').innerText = 'লোড হচ্ছে...';
                const res = await fetch(DATA_URL);
                if (res.ok) {
                    appData = await res.json();
                }
                renderUI();
                document.getElementById('statusText').innerText = 'আপডেট: ' + new Date().toLocaleTimeString();
            } catch (e) {
                renderUI();
                document.getElementById('statusText').innerText = 'অফলাইন মোড';
            }
        }

        function renderUI() {
            const profileImg = appData.profile.image 
                ? `<img src="${appData.profile.image}">`
                : `<div class="no-image">${appData.profile.name.charAt(0)}</div>`;

            const videosHTML = appData.videos?.map(v => `
                <div class="video-card">
                    <div class="video-player">
                        <video controls><source src="${v.url}"></video>
                    </div>
                    <div style="text-align:center">${v.title}</div>
                </div>
            `).join('') || '<p style="color:#94a3b8">কোন ভিডিও নেই</p>';

            const galleryHTML = appData.gallery?.map(img => `
                <div class="gallery-item"><img src="${img}"></div>
            `).join('') || '<p style="color:#94a3b8">কোন ছবি নেই</p>';

            document.getElementById('app').innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar">${profileImg}</div>
                        <h1>${appData.profile.name}</h1>
                        <div class="id-badge">${appData.profile.id}</div>
                    </div>
                </div>

                <div class="section-title">🎥 ভিডিও (${appData.videos?.length || 0})</div>
                <div class="video-grid">${videosHTML}</div>

                <div class="section-title">🖼️ গ্যালারি (${appData.gallery?.length || 0})</div>
                <div class="gallery-grid">${galleryHTML}</div>

                <div class="gaali-section">
                    <div class="gaali-btn" id="gaaliBtn">${appData.profile.id}</div>
                    <div class="gaali-output" id="gaaliOutput">🔊 ক্লিক করুন</div>
                </div>

                <div class="footer">© ২০২৪ সেনা পোর্টাল</div>
            `;

            document.getElementById('gaaliBtn')?.addEventListener('click', function() {
                const gaalis = appData.gaalis || ['হারামি'];
                const random = gaalis[Math.floor(Math.random() * gaalis.length)];
                document.getElementById('gaaliOutput').innerText = random;
                
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const utter = new SpeechSynthesisUtterance(random);
                    utter.lang = 'bn-BD';
                    window.speechSynthesis.speak(utter);
                }
            });
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
